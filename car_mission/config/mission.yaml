# car_mission 파라미터 (TODO: 실측값으로 채우기)
mission_manager:
  ros__parameters:
    robot_namespace: "/robot2"
    goal_x: 0.0            # 고정좌표 (map 프레임) — 맵 만든 뒤 실측
    goal_y: 0.0
    goal_yaw: 0.0
    stop_distance_m: 0.5   # 차량에 이 거리까지 접근하면 정지
    search_angular_speed: 0.4
    approach_linear_speed: 0.15
    yaw_kp: 0.005
    bearing_centered: 0.1

cctv_detector:
  ros__parameters:
    camera_index: 0        # /dev/video0 (TODO: 실제 CCTV 카메라 index 확인)
    model_path: ""         # 비우면 turtlebot4_yolo/models/best.pt
    conf: 0.5
    car_class_name: "car"
    fps: 10.0
    detect_frames: 3

car_tracker:
  ros__parameters:
    detections_topic: "/yolo/detections"
    depth_topic: "/robot2/oakd/stereo/image_raw"
    car_class_name: "car"
    image_width: 320       # 로봇 RGB preview 폭 (TODO: 실제 입력 해상도와 일치시킬 것)
